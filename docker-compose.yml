services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: hydrology
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/hydrology
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/hydrology
    depends_on:
      db:
        condition: service_healthy
