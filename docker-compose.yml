services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: hydrology
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/hydrology
    depends_on:
      - db
    ports:
      - "8000:8000"
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/hydrology
    depends_on:
      - db
